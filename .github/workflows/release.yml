name: Release

on:
  push:
    tags:
      - 'v*'

# Chỉ chạy 1 release tại 1 thời điểm
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Ensure tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version:     $TAG_VERSION"
          echo "package.json:    $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) không khớp version trong package.json ($PKG_VERSION)."
            exit 1
          fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: npm-production
      url: https://www.npmjs.com/package/@vn-gis/map
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Detect npm dist-tag
        id: disttag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if echo "$TAG_VERSION" | grep -qE '-(alpha|beta|rc|next)'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "Prerelease phát hiện -> dist-tag: next"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Stable release -> dist-tag: latest"
          fi

      - name: Publish
        # Trusted Publishing (OIDC): npm CLI tự xin token từ GitHub Actions
        # Không cần NODE_AUTH_TOKEN. Token được GitHub ký, hết hạn ~5 phút.
        run: npm publish --provenance --access public --tag ${{ steps.disttag.outputs.tag }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: ${{ github.ref_name }}
