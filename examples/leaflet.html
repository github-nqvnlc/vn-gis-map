<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VN GIS Map - Leaflet Example</title>

    <!-- Leaflet CSS (peer dependency) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        width: 320px;
        padding: 20px;
        background: #f7f8fa;
        border-right: 1px solid #e2e6ea;
        overflow-y: auto;
      }
      #sidebar h1 {
        font-size: 18px;
        margin: 0 0 20px;
        color: #1a4f8a;
      }
      #map {
        flex: 1;
        height: 100vh;
      }
      .control-group {
        margin-bottom: 20px;
      }
      .control-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #555;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      button {
        display: inline-block;
        padding: 8px 14px;
        margin: 0 6px 6px 0;
        border: none;
        border-radius: 6px;
        background: #4a90d9;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover {
        background: #2c6fad;
      }
      button.secondary {
        background: #e2e6ea;
        color: #333;
      }
      button.secondary:hover {
        background: #cfd4da;
      }
      button.danger {
        background: #dc3545;
      }
      button.danger:hover {
        background: #c82333;
      }
      input, select {
        width: 100%;
        padding: 8px;
        border: 1px solid #cfd4da;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 8px;
      }
      #info {
        font-size: 13px;
        line-height: 1.6;
        color: #333;
        background: #fff;
        border: 1px solid #e2e6ea;
        border-radius: 6px;
        padding: 12px;
        min-height: 60px;
      }
      .code-block {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 12px;
        border-radius: 6px;
        font-family: 'Fira Code', monospace;
        font-size: 12px;
        overflow-x: auto;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>VN GIS Map - Leaflet</h1>

      <div class="control-group">
        <label>Map Configuration</label>
        <button id="btn-default">Vietnam Center</button>
        <button id="btn-hanoi" class="secondary">Hanoi</button>
        <button id="btn-hcmc" class="secondary">Ho Chi Minh City</button>
      </div>

      <div class="control-group">
        <label>Zoom Controls</label>
        <button id="btn-zoom-in">Zoom In (+)</button>
        <button id="btn-zoom-out">Zoom Out (-)</button>
      </div>

      <div class="control-group">
        <label>Add Marker</label>
        <input type="text" id="marker-title" placeholder="Marker title" value="Hanoi, Vietnam" />
        <input type="number" id="marker-lat" placeholder="Latitude" value="21.0285" step="0.0001" />
        <input type="number" id="marker-lng" placeholder="Longitude" value="105.8542" step="0.0001" />
        <button id="btn-add-marker">Add Marker</button>
      </div>

      <div class="control-group">
        <label>Add Polygon</label>
        <input type="text" id="polygon-name" placeholder="Polygon name" value="Demo Polygon" />
        <button id="btn-add-polygon">Add Triangle Polygon</button>
      </div>

      <div class="control-group">
        <label>Custom GeoJSON</label>
        <button id="btn-add-geojson">Add Vietnam Boundary</button>
      </div>

      <div class="control-group">
        <label>Layer Management</label>
        <button id="btn-remove-last" class="danger">Remove Last Layer</button>
        <button id="btn-clear-all" class="danger">Clear All Layers</button>
      </div>

      <div class="control-group">
        <label>Event Log</label>
        <div id="info">Click on the map or interact with controls to see events.</div>
      </div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS (peer dependency) -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- VNGisMap Library -->
    <script type="module">
      import { VNGisMap, VN_CENTER, VN_BOUNDS } from '../dist/index.esm.js';

      const infoEl = document.getElementById('info');
      const layers = [];

      // Create map instance
      const map = new VNGisMap({
        container: 'map',
        renderer: 'leaflet',
        center: VN_CENTER,
        zoom: 6,
        maxZoom: 18,
        minZoom: 5,
        bounds: VN_BOUNDS,
        scrollWheelZoom: true,
      });

      // Event: Map ready
      map.on('ready', () => {
        logEvent('Map ready!');
      });

      // Event: Click
      map.on('click', (payload) => {
        logEvent(`Click at: ${payload.data?.lat?.toFixed(4)}, ${payload.data?.lng?.toFixed(4)}`);
      });

      // Event: Layer add
      map.on('layeradd', (payload) => {
        logEvent(`Layer added: ${payload.data?.id} (${payload.data?.type})`);
      });

      // Event: Layer remove
      map.on('layerremove', (payload) => {
        logEvent(`Layer removed: ${payload.data?.id}`);
      });

      // Map Configuration Controls
      document.getElementById('btn-default').onclick = () => {
        map.setView(VN_CENTER, 6);
        logEvent('View set to Vietnam center');
      };

      document.getElementById('btn-hanoi').onclick = () => {
        map.setView([21.0285, 105.8542], 12);
        logEvent('View set to Hanoi');
      };

      document.getElementById('btn-hcmc').onclick = () => {
        map.setView([10.8231, 106.6297], 12);
        logEvent('View set to Ho Chi Minh City');
      };

      // Zoom Controls
      document.getElementById('btn-zoom-in').onclick = () => {
        const options = map.getOptions();
        map.setView(options.center, Math.min(options.zoom + 1, options.maxZoom));
        logEvent('Zoom in');
      };

      document.getElementById('btn-zoom-out').onclick = () => {
        const options = map.getOptions();
        map.setView(options.center, Math.max(options.zoom - 1, options.minZoom));
        logEvent('Zoom out');
      };

      // Add Marker
      document.getElementById('btn-add-marker').onclick = () => {
        const title = document.getElementById('marker-title').value;
        const lat = parseFloat(document.getElementById('marker-lat').value);
        const lng = parseFloat(document.getElementById('marker-lng').value);

        const id = `marker-${Date.now()}`;
        map.addLayer(id, 'marker', {
          lat,
          lng,
          title,
          popup: `<strong>${title}</strong><br/>Lat: ${lat}<br/>Lng: ${lng}`,
        });
        layers.push(id);
        logEvent(`Added marker at ${lat}, ${lng}`);
      };

      // Add Polygon
      document.getElementById('btn-add-polygon').onclick = () => {
        const name = document.getElementById('polygon-name').value;
        const id = `polygon-${Date.now()}`;

        // Triangle around a point
        const baseLat = 21.0285;
        const baseLng = 105.8542;
        const size = 0.1;

        map.addLayer(id, 'polygon', {
          coordinates: [
            [baseLat, baseLng],
            [baseLat + size, baseLng],
            [baseLat + size / 2, baseLng + size],
          ],
          color: '#ff5722',
          fillColor: '#ff5722',
          fillOpacity: 0.3,
          weight: 2,
        });
        layers.push(id);
        logEvent(`Added polygon: ${name}`);
      };

      // Add GeoJSON
      document.getElementById('btn-add-geojson').onclick = () => {
        const id = `geojson-${Date.now()}`;

        // Simple Vietnam-like polygon for demo
        const geojsonData = {
          type: 'FeatureCollection',
          features: [
            {
              type: 'Feature',
              geometry: {
                type: 'Polygon',
                coordinates: [
                  [
                    [102.14, 8.18],
                    [109.47, 8.18],
                    [109.47, 23.24],
                    [102.14, 23.24],
                    [102.14, 8.18],
                  ],
                ],
              },
              properties: { name: 'Vietnam Demo Boundary' },
            },
          ],
        };

        map.addLayer(id, 'geojson', {
          data: geojsonData,
          style: {
            color: '#4a90d9',
            fillColor: '#4a90d9',
            fillOpacity: 0.1,
            weight: 2,
          },
        });
        layers.push(id);
        logEvent('Added GeoJSON boundary');
      };

      // Remove Last Layer
      document.getElementById('btn-remove-last').onclick = () => {
        if (layers.length > 0) {
          const lastLayer = layers.pop();
          map.removeLayer(lastLayer);
          logEvent(`Removed layer: ${lastLayer}`);
        } else {
          logEvent('No layers to remove');
        }
      };

      // Clear All Layers
      document.getElementById('btn-clear-all').onclick = () => {
        layers.forEach((layerId) => map.removeLayer(layerId));
        layers.length = 0;
        logEvent('Cleared all layers');
      };

      // Utility: Log event
      function logEvent(message) {
        const time = new Date().toLocaleTimeString();
        infoEl.innerHTML = `<strong>[${time}]</strong> ${message}`;
        console.log(`[VNGisMap] ${message}`);
      }
    </script>
  </body>
</html>
